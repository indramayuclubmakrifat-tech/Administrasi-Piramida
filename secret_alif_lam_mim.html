<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNCI ALIF LAM MIM - INDRAMAYU CLUB</title>
    <style>
        body { 
            background: #000; 
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            border: 2px solid gold; 
            padding: 30px; 
            border-radius: 20px; 
            background: rgba(0, 255, 0, 0.05); 
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            width: 85%;
        }
        h1 { color: gold; text-shadow: 0 0 10px gold; }
        .status-line { margin: 10px 0; border-bottom: 1px dashed #004400; padding: 5px; display: flex; justify-content: space-between; }
        .btn-back { 
            display: block; 
            margin-top: 25px; 
            padding: 15px; 
            background: #007bff; 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        .btn-back:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔓 GERBANG NUR TERBUKA</h1>
        <p>Akses Terverifikasi: <b>Nur Makrifat</b></p>
        <hr color="gold">
        
        <div class="status-line"><span>Voucher:</span> <span style="color:gold">AKTIF</span></div>
        <div class="status-line"><span>Coin Member:</span> <span style="color:gold">READY</span></div>
        <div class="status-line"><span>Potongan Kas:</span> <span style="color:gold">5%</span></div>
        
        <a href="/" class="btn-back">🏠 KEMBALI KE RUMAH BACKUP</a>
    </div>
</body>
</html>
